<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Аналитика по видам работ</title>
    <!-- Подключаем стили из основного проекта -->
    <link rel="stylesheet" href="styles.css"> 
    <style>
        /* Дополнительные стили для аналитики */
        .analytics-container { max-width: 1200px; margin: 20px auto; padding: 20px; }
        .controls-block { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .control-row { display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 10px; }
        select, input, button { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .leader { background-color: #d4edda; font-weight: bold; }
    </style>
</head>
<body>

<div class="analytics-container">
    <h1>📊 Сравнение видов работ за период</h1>
    
    <div class="controls-block">
        <div class="control-row">
            <label>Дата начала: <input type="date" id="start-date"></label>
            <label>Дата окончания: <input type="date" id="end-date"></label>
        </div>
        <div class="control-row">
            <label>Виды работ: 
                <select id="work-types-select" multiple style="height: 100px; min-width: 200px;">
                    <!-- Заполнится через JS -->
                </select>
            </label>
            <button id="analyze-btn">Показать сравнение</button>
            <button id="reset-btn" style="background:#6c757d">Очистить</button>
        </div>
    </div>

    <div id="results-area"></div>
</div>

<!-- Подключаем utils.js ОБЫЧНЫМ способом (без type="module"), чтобы он создал глобальные переменные -->
<script src="JS/utils.js"></script>
<script src="JS/data.js"></script>

<!-- Подключаем наш скрипт аналитики КАК МОДУЛЬ -->
<script type="module">
    // Так как utils.js загружен обычным скриптом, функции теперь в глобальной области видимости (window)
    const { parseTime, formatCurrency, workTypeColors } = window;
    
    // Импортируем только то, что нужно из data.js (если там есть экспорты) или используем глобальные, если data.js тоже обычный
    // Предположим, data.js тоже обычный и заполняет window.records
    
    import { loadData, getArchiveNameForDate } from './JS/data.js'; // Если data.js использует export

    let allRecords = [];
    let availableWorkTypes = [];

    // Инициализация
    document.addEventListener('DOMContentLoaded', async () => {
        // 1. Загружаем данные (адаптируйте под вашу логику загрузки)
        // Если loadData требует архив, берем текущий
        const archive = getArchiveNameForDate(new Date());
        
        try {
            // Здесь должна быть логика загрузки данных в allRecords
            // Если loadData возвращает промис с данными:
            const data = await loadData(archive); 
            allRecords = data.records || window.records || [];
            
            initPage();
        } catch (e) {
            console.error("Ошибка загрузки:", e);
            document.getElementById('results-area').innerHTML = '<p style="color:red">Ошибка загрузки данных</p>';
        }
    });

    function initPage() {
        // Установка дат (последние 30 дней по умолчанию)
        const end = new Date();
        const start = new Date();
        start.setDate(start.getDate() - 30);
        
        document.getElementById('end-date').valueAsDate = end;
        document.getElementById('start-date').valueAsDate = start;

        // Сбор уникальных видов работ
        const typesSet = new Set(allRecords.map(r => r['Вид работы'] || r['workType'])); 
        availableWorkTypes = Array.from(typesSet).filter(Boolean).sort();
        
        const select = document.getElementById('work-types-select');
        select.innerHTML = '';
        availableWorkTypes.forEach(type => {
            const option = document.createElement('option');
            option.value = type;
            option.textContent = type;
            select.appendChild(option);
        });

        // Навешиваем события
        document.getElementById('analyze-btn').addEventListener('click', runAnalysis);
        document.getElementById('reset-btn').addEventListener('click', () => {
            document.getElementById('results-area').innerHTML = '';
            Array.from(select.options).forEach(o => o.selected = false);
        });
    }

    function runAnalysis() {
        const startStr = document.getElementById('start-date').value;
        const endStr = document.getElementById('end-date').value;
        const selectedOptions = Array.from(document.getElementById('work-types-select').selectedOptions).map(o => o.value);

        if (!startStr || !endStr) {
            alert('Выберите даты периода');
            return;
        }
        if (selectedOptions.length === 0) {
            alert('Выберите хотя бы один вид работ');
            return;
        }

        const startDate = new Date(startStr);
        const endDate = new Date(endStr);
        // Коррекция времени, чтобы включить весь день конца периода
        endDate.setHours(23, 59, 59);

        // Фильтрация данных
        const filtered = allRecords.filter(r => {
            // Парсим дату из записи (предполагаем формат DD.MM.YYYY или другой)
            // Адаптируйте парсинг под ваш формат даты в records
            let recDate;
            if (r['Рабочий день']) {
                const parts = r['Рабочий день'].split('.');
                recDate = new Date(parts[2], parts[1]-1, parts[0]);
            } else {
                return false;
            }

            const isTypeMatch = selectedOptions.includes(r['Вид работы'] || r['workType']);
            const isDateMatch = recDate >= startDate && recDate <= endDate;

            return isTypeMatch && isDateMatch;
        });

        renderResults(filtered, selectedOptions);
    }

    function renderResults(data, types) {
        const container = document.getElementById('results-area');
        if (data.length === 0) {
            container.innerHTML = '<p>Нет данных за выбранный период для выбранных видов работ.</p>';
            return;
        }

        // Группировка по видам работ
        const stats = {};
        types.forEach(t => stats[t] = { count: 0, hours: 0, volume: 0, cost: 0, workers: new Set() });

        data.forEach(r => {
            const type = r['Вид работы'] || r['workType'];
            if (!stats[type]) return;
            
            stats[type].count++;
            // Примерный расчет часов (адаптируйте под ваши поля)
            const time = parseTime(r['Время']) || 0; 
            stats[type].hours += time;
            
            // Объем (если есть поле)
            const vol = parseFloat(r['Объем']) || 0;
            stats[type].volume += vol;

            // Расходы (если есть)
            const cost = parseFloat(r['Расходы']) || 0;
            stats[type].cost += cost;

            if (r['ФИО'] || r['worker']) stats[type].workers.add(r['ФИО'] || r['worker']);
        });

        // Поиск лидера (по производительности: объем / часы)
        let maxProductivity = -1;
        let leaderType = '';
        
        Object.keys(stats).forEach(type => {
            if (stats[type].hours > 0) {
                const prod = stats[type].volume / stats[type].hours;
                if (prod > maxProductivity) {
                    maxProductivity = prod;
                    leaderType = type;
                }
            }
        });

        // Генерация таблицы
        let html = `<h3>Период: ${document.getElementById('start-date').value} - ${document.getElementById('end-date').value}</h3>`;
        html += `<table><thead><tr>
            <th>Вид работ</th>
            <th>Записей</th>
            <th>Часов</th>
            <th>Объем</th>
            <th>Произв-сть (об/час)</th>
            <th>Бригад</th>
            <th>Расходы</th>
        </tr></thead><tbody>`;

        Object.keys(stats).sort().forEach(type => {
            const s = stats[type];
            const productivity = s.hours > 0 ? (s.volume / s.hours).toFixed(2) : 0;
            const isLeader = type === leaderType && s.hours > 0;
            const color = workTypeColors[type] || '#ccc';

            html += `<tr class="${isLeader ? 'leader' : ''}" style="border-left: 5px solid ${color}">
                <td>${type} ${isLeader ? '🏆' : ''}</td>
                <td>${s.count}</td>
                <td>${s.hours.toFixed(1)}</td>
                <td>${s.volume.toFixed(1)}</td>
                <td>${productivity}</td>
                <td>${s.workers.size}</td>
                <td>${formatCurrency(s.cost)}</td>
            </tr>`;
        });

        html += '</tbody></table>';
        container.innerHTML = html;
    }
</script>

</body>
</html>
