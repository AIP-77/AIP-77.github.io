<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нормативы — AIP-77</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/inter@5.0.0/index.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f7fa;
    color: #1a202c;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
    color: white;
    position: relative;
    overflow: hidden;
  }
  .header-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: url('https://image.qwenlm.ai/public_source/5f22183d-830f-46b7-9d7d-95f15111f75c/14d313556-1206-46ea-b30a-314861e31efb.png') center/cover;
    opacity: 0.25;
  }
  .header-content {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 32px;
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 16px;
  }
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: white;
    padding: 10px 20px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 500;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.25);
    transition: all 0.2s;
  }
  .back-btn:hover {
    background: rgba(255,255,255,0.25);
    transform: translateY(-1px);
  }
  .header-title {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .header-subtitle {
    font-size: 14px;
    opacity: 0.9;
    margin-top: 4px;
  }
  .update-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13px;
    border: 1px solid rgba(255,255,255,0.25);
  }
  .update-badge .dot {

    border-radius: 50%;

  @keyframes pulse {

  }
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 32px 48px;
  }
  .filters {

    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;

  }
  .filter-group {
    display: flex;

  }
  .filter-group label {

    font-weight: 600;
    text-transform: uppercase;

  }
  .filter-group input {

    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    background: #f8fafc;
    color: #1a202c;

  }
  .filter-group input:focus {

    border-color: #3b82f6;
    background: white;

  .direction-block {
    background: white;
    border-radius: 14px;

  }
  .direction-header {

    justify-content: space-between;

    cursor: pointer;

  .direction-header-left {

  .direction-icon {

    align-items: center;

    font-size: 20px;
    flex-shrink: 0;
  }
  .direction-name {

    font-weight: 700;

  }
  .direction-meta {
    font-size: 12px;
    color: #64748b;

  }
  .direction-chevron {

  .direction-block.open .direction-chevron {

  }

  .dept-block {

  .dept-header {

    align-items: center;

  }

  .dept-name {

  .dept-count {

  .dept-chevron {

  .dept-block.open .dept-chevron {

  table {

  }

    text-align: left;
    font-weight: 600;
    color: #475569;
    font-size: 11px;

    border-bottom: 1px solid #e2e8f0;

  tbody tr:hover { background: #f8fafc; }

  .work-cell {

  .tags-cell {

  .tag {

    font-weight: 600;

    margin-bottom: 16px;

    transition: opacity 0.25s ease;

  .modal {

    border-radius: 18px;

    width: 100%;

    transform: scale(0.92) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);

  .modal-overlay.active .modal {

  .modal-header {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 22px 24px 16px;
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);

  .modal-icon {

    justify-content: center;

  .modal-icon svg {

    color: #d97706;
  }
  .modal-title {
    font-size: 22px;
    font-weight: 700;
    color: #78350f;
    letter-spacing: -0.3px;
  }
  .modal-subtitle {
    font-size: 13px;
    color: #92400e;
    margin-top: 2px;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 34px; height: 34px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.7);

    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 2;
  }
  .modal-close:hover {
    background: white;

  .modal-body {
    padding: 24px;
    max-height: 60vh;
    overflow-y: auto;
  }
  .modal-content-placeholder {
    background: #fffbeb;
    border: 1px dashed #fcd34d;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    color: #92400e;

    line-height: 1.6;
  }
  .modal-content-placeholder .placeholder-icon {
    font-size: 32px;
    margin-bottom: 8px;
    opacity: 0.7;

  .modal-footer {
    padding: 16px 24px 22px;

  .modal-btn {

    font-size: 14px;
    font-weight: 600;

  @media (max-width: 768px) {

</head>

<script>
const RAW_URL = 'https://raw.githubusercontent.com/AIP-77/AIP-77.github.io/main/archive/standard.json';

let allData = [];
let allExpanded = false;

const DIRECTION_ICONS = {
  'Общие': { icon: '📋', color: '#94a3b8', bg: '#f1f5f9' },
  'Адресная система': { icon: '📍', color: '#8b5cf6', bg: '#ede9fe' },
  'Входящие': { icon: '📥', color: '#10b981', bg: '#d1fae5' },
  'Исходящие': { icon: '📤', color: '#3b82f6', bg: '#dbeafe' },
  'Производство': { icon: '🏭', color: '#f59e0b', bg: '#fef3c7' },
};

const DEPT_ICONS = {
  'Общие': '⚙️',
  'Хранение': '📦',
  'Разгрузка': '🚚',
  'Размещение': '🗂️',
  'Размещение возвратов': '↩️',
  'Приемка': '✅',
  'Сборка': '📋',
  'Сборка Диски': '💿',
  'Сборка Шины': '🛞',
  'Отгрузка': '🚛',
  'МП': '🏪',
  'Производство': '🏭',
};

function getDirectionStyle(name) {
  return DIRECTION_ICONS[name] || { icon: '📦', color: '#64748b', bg: '#f1f5f9' };
}

function getDeptIcon(name) {
  return DEPT_ICONS[name] || '🏢';
}

function formatDate(isoStr) {
  const d = new Date(isoStr);
  const opts = { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' };
  return d.toLocaleDateString('ru-RU', opts);
}

function parseNorm(str) {
  if (str === null || str === undefined || String(str).trim() === '') return null;
  const m = String(str).match(/[\d.,]+/);
  return m ? parseFloat(m[0].replace(',', '.')) : null;
}

function uniqueValues(arr) {
  const seen = new Set();
  const result = [];
  arr.forEach(v => {
    const key = v === null || v === undefined || String(v).trim() === '' ? null : String(v).trim();
    if (key !== null && !seen.has(key)) {
      seen.add(key);
      result.push(key);
    }
  });
  return result;
}

function isServiceRow(row) {
  const dir = row[0] || '';
  const work = row[1] || '';
  return dir === '' && (String(work).includes('Установленая') || String(work).includes('Дополнительный список'));
}

function buildHierarchy(data) {
  const dirOrder = [];
  const dirs = {};
  
  data.forEach(row => {
    if (isServiceRow(row)) return;
    
    const direction = row[0] || '';
    const dept = (row[10] && String(row[10]).trim()) || '';
    const workName = row[1] || '';
    
    const dirKey = direction || '(Без направления)';
    if (!dirs[dirKey]) {
      dirs[dirKey] = { name: dirKey, depts: {}, deptOrder: [] };
      dirOrder.push(dirKey);
    }
    
    const deptKey = dept || '(Без отдела)';
    if (!dirs[dirKey].depts[deptKey]) {
      dirs[dirKey].depts[deptKey] = { name: deptKey, works: {}, workOrder: [] };
      dirs[dirKey].deptOrder.push(deptKey);
    }
    
    if (!dirs[dirKey].depts[deptKey].works[workName]) {
      dirs[dirKey].depts[deptKey].works[workName] = [];
      dirs[dirKey].depts[deptKey].workOrder.push(workName);
    }
    dirs[dirKey].depts[deptKey].works[workName].push(row);
  });
  
  return dirOrder.map(dirKey => {
    const dir = dirs[dirKey];
    return {
      name: dir.name,
      depts: dir.deptOrder.map(deptKey => {
        const dept = dir.depts[deptKey];
        return {
          name: dept.name,
          works: dept.workOrder.map(workName => {
            const rows = dept.works[workName];
            return {
              name: workName,
              groups: uniqueValues(rows.map(r => r[2])),
              positions: uniqueValues(rows.map(r => r[3])),
              units: uniqueValues(rows.map(r => r[4])),
              prices: uniqueValues(rows.map(r => r[5])),
              norm1: uniqueValues(rows.map(r => parseNorm(r[6]))),
              personnel: uniqueValues(rows.map(r => r[11])),
            };
          })
        };
      })
    };
  });
}

function renderTags(values, type) {
  if (!values || values.length === 0) return '<span class="empty-cell">—</span>';
  return '<div class="tags-cell">' + values.map(v => {
    let cls = '';
    if (type === 'position') {
      cls = String(v).includes('Ответственн') ? 'position-resp' : 'position-emp';
    } else if (type === 'unit') {
      cls = 'unit-tag';
    } else if (type === 'group') {
      cls = 'group-tag';
    }
    return `<span class="tag ${cls}">${v}</span>`;
  }).join('') + '</div>';
}

function renderNormTags(values) {
  if (!values || values.length === 0) return '<span class="empty-cell">—</span>';
  return '<div class="tags-cell">' + values.map(v => {
    const display = v === null ? '—' : String(v).replace('.', ',');
    return `<span class="tag">${display}</span>`;
  }).join('') + '</div>';
}

function renderPriceTags(values) {
  if (!values || values.length === 0) return '<span class="empty-cell">—</span>';
  return '<div class="tags-cell">' + values.map(v => 
    `<span class="tag" style="background:#d1fae5;color:#065f46;">${v}</span>`
  ).join('') + '</div>';
}

function renderBlocks(hierarchy) {
  const container = document.getElementById('blocksContainer');
  container.innerHTML = '';
  
  if (hierarchy.length === 0) {
    container.innerHTML = `
      <div class="no-results">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <div>Ничего не найдено</div>
      </div>`;
    document.getElementById('resultsCount').innerHTML = '';
    return;
  }
  
  let totalWorks = 0;
  let totalDepts = 0;
  hierarchy.forEach(d => {
    totalDepts += d.depts.length;
    d.depts.forEach(dept => totalWorks += dept.works.length);
  });
  document.getElementById('resultsCount').innerHTML = 
    `Найдено: <strong>${hierarchy.length}</strong> направлений · <strong>${totalDepts}</strong> отделов · <strong>${totalWorks}</strong> видов работ`;
  
  hierarchy.forEach((dir, idx) => {
    const style = getDirectionStyle(dir.name);
    const block = document.createElement('div');
    block.className = 'direction-block' + (idx === 0 ? ' open' : '');
    
    const totalWorksInDir = dir.depts.reduce((s, d) => s + d.works.length, 0);
    
    let deptsHtml = '';
    dir.depts.forEach((dept, dIdx) => {
      const deptIcon = getDeptIcon(dept.name);
      deptsHtml += `
        <div class="dept-block${dIdx === 0 ? ' open' : ''}">
          <div class="dept-header">
            <div class="dept-icon">${deptIcon}</div>
            <div class="dept-name">${dept.name}</div>
            <div class="dept-count">${dept.works.length} вид. работ</div>
            <svg class="dept-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
          </div>
          <div class="dept-body">
            <div class="table-scroll">
              <table>
                <thead>
                  <tr>
                    <th>Вид работ</th>
                    <th>Группа товара</th>
                    <th>Должность</th>
                    <th>Ед. расчёта</th>
                    <th>Расценка</th>
                    <th>Норматив 1</th>
                    <th>Персонал</th>
                  </tr>
                </thead>
                <tbody>
                  ${dept.works.map(w => `
                    <tr>
                      <td class="work-cell">${w.name}</td>
                      <td>${renderTags(w.groups, 'group')}</td>
                      <td>${renderTags(w.positions, 'position')}</td>
                      <td>${renderTags(w.units, 'unit')}</td>
                      <td>${renderPriceTags(w.prices)}</td>
                      <td>${renderNormTags(w.norm1)}</td>
                      <td>${w.personnel.length > 0 ? renderTags(w.personnel) : '<span class="empty-cell">—</span>'}</td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;
    });
    
    block.innerHTML = `
      <div class="direction-header">
        <div class="direction-header-left">
          <div class="direction-icon" style="background:${style.bg};color:${style.color};">
            ${style.icon}
          </div>
          <div>
            <div class="direction-name">${dir.name}</div>
            <div class="direction-meta">
              ${dir.depts.length} отделов · ${totalWorksInDir} видов работ
            </div>
          </div>
        </div>
        <svg class="direction-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="direction-body">
        ${deptsHtml}
      </div>
    `;
    
    block.querySelector('.direction-header').addEventListener('click', () => {
      block.classList.toggle('open');
    });
    
    block.querySelectorAll('.dept-header').forEach(header => {
      header.addEventListener('click', (e) => {
        e.stopPropagation();
        header.parentElement.classList.toggle('open');
      });
    });
    
    container.appendChild(block);
  });
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase().trim();
  
  const filteredRaw = allData.filter(row => {
    if (isServiceRow(row)) return false;
    
    const dir = row[0] || '';
    const work = row[1] || '';
    const group = row[2] || '';
    const dept = row[10] || '';
    
    const matchSearch = !search || 
      String(work).toLowerCase().includes(search) || 
      String(dir).toLowerCase().includes(search) ||
      String(group).toLowerCase().includes(search) ||
      String(dept).toLowerCase().includes(search);
    
    return matchSearch;
  });
  
  const hierarchy = buildHierarchy(filteredRaw);
  renderBlocks(hierarchy);
}

// ===== Модальное окно "Внимание" =====
function setupModal() {
  const modal = document.getElementById('attentionModal');
  const closeBtn = document.getElementById('modalCloseBtn');
  const okBtn = document.getElementById('modalOkBtn');
  
  function closeModal() {
    modal.classList.remove('active');
  }
  
  function openModal() {
    modal.classList.add('active');
  }
  
  // Открытие при загрузке (с небольшой задержкой для плавности)
  setTimeout(openModal, 300);
  
  closeBtn.addEventListener('click', closeModal);
  okBtn.addEventListener('click', closeModal);
  
  // Закрытие по клику на overlay
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
  
  // Закрытие по Escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('active')) {
      closeModal();
    }
  });
}

async function loadData() {
  try {
    const res = await fetch(RAW_URL);
    if (!res.ok) throw new Error('Ошибка загрузки');
    const json = await res.json();
    
    allData = json.data;
    
    document.getElementById('updateDate').textContent = formatDate(json.lastUpdated);
    document.getElementById('updateBadge').style.display = 'inline-flex';
    
    applyFilters();
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    
    document.getElementById('searchInput').addEventListener('input', applyFilters);
    
    document.getElementById('collapseAllBtn').addEventListener('click', () => {
      allExpanded = !allExpanded;
      document.querySelectorAll('.direction-block').forEach(b => {
        if (allExpanded) b.classList.add('open');
        else b.classList.remove('open');
      });
      document.querySelectorAll('.dept-block').forEach(b => {
        if (allExpanded) b.classList.add('open');
        else b.classList.remove('open');
      });
      document.getElementById('collapseBtnText').textContent = allExpanded ? 'Свернуть все' : 'Развернуть все';
    });
    
  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML = `
      <strong>Не удалось загрузить данные</strong><br>
      ${err.message}<br>
      <small>Проверьте подключение к интернету или доступность файла standard.json</small>
    `;
  }
}

setupModal();
loadData();
</script>
