<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Топология склада - Блочная схема</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --cell-w: 40px;  /* Ширина одной условной единицы сетки */
            --cell-h: 30px;  /* Высота одной условной единицы сетки */
            --header-h: 30px;
            --sidebar-w: 40px;
            
            --color-storage: #85c1e9;
            --color-storage-hover: #5dade2;
            --color-passage: #aed6f1;
            --color-wall: #2c3e50;
            --color-special: #f9e79f;
            --color-has-items: #2ecc71;
            --color-text: #1a5276;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            overflow: auto;
        }

        .header {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Контейнер схемы с осями координат */
        .map-wrapper {
            position: relative;
            display: inline-block;
            background: white;
            padding: var(--header-h) 0 0 var(--sidebar-w);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            overflow: visible;
        }

        /* Оси координат */
        .axis-top {
            position: absolute;
            top: 0;
            left: var(--sidebar-w);
            height: var(--header-h);
            display: flex;
            border-bottom: 2px solid #ccc;
            z-index: 10;
        }
        .axis-left {
            position: absolute;
            top: var(--header-h);
            left: 0;
            width: var(--sidebar-w);
            display: flex;
            flex-direction: column;
            border-right: 2px solid #ccc;
            z-index: 10;
        }
        .axis-corner {
            position: absolute;
            top: 0;
            left: 0;
            width: var(--sidebar-w);
            height: var(--header-h);
            background: #eee;
            z-index: 20;
            border-right: 2px solid #ccc;
            border-bottom: 2px solid #ccc;
        }

        .axis-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #555;
            box-sizing: border-box;
        }
        .axis-label.col { width: var(--cell-w); border-right: 1px solid #eee; }
        .axis-label.row { height: var(--cell-h); border-bottom: 1px solid #eee; }

        /* Область карты */
        .map-area {
            position: relative;
            /* Размеры будут заданы через JS в зависимости от макс. координат */
            background-image: 
                linear-gradient(#f9f9f9 1px, transparent 1px),
                linear-gradient(90deg, #f9f9f9 1px, transparent 1px);
            background-size: var(--cell-w) var(--cell-h);
            background-position: -1px -1px;
        }

        /* Блоки зон */
        .zone-block {
            position: absolute;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: bold;
            font-size: 12px;
            color: var(--color-text);
            background: var(--color-storage);
            border: 1px solid #5dade2;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
            z-index: 5;
            padding: 2px;
            word-break: break-word;
        }

        .zone-block:hover {
            transform: scale(1.02);
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            background: var(--color-storage-hover);
        }

        .zone-block.has-items {
            background: var(--color-has-items);
            border-color: #27ae60;
            color: white;
        }

        .zone-block.passage {
            background: var(--color-passage);
            border: none;
            color: #7fb3d5;
            font-style: italic;
            z-index: 1;
        }

        .zone-block.wall {
            background: var(--color-wall);
            border: none;
            z-index: 6;
        }
        
        .zone-block.special {
            background: var(--color-special);
            border-color: #f1c40f;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; position: sticky; top: 0; }
        tr:hover { background: #f1f7ff; }

        .stats-bar {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            display: flex;
            gap: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>🗺️ Топология склада (Блочная схема)</h1>
        <div id="period-info" style="color: #7f8c8d; font-size: 0.9rem;">Загрузка...</div>
    </div>
    <div>
        <button onclick="location.reload()" style="padding: 8px 15px; cursor: pointer;">🔄 Обновить</button>
        <button onclick="window.location.href='store2.html'" style="padding: 8px 15px; cursor: pointer;">📊 Поиск</button>
    </div>
</div>

<div class="map-wrapper" id="map-wrapper">
    <div class="axis-corner"></div>
    <div class="axis-top" id="axis-top"></div>
    <div class="axis-left" id="axis-left"></div>
    <div class="map-area" id="map-area">
        <!-- Блоки генерируются здесь -->
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modal-title">Информация</h2>
            <button onclick="closeModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
        </div>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const EXCEL_URL = 'https://raw.githubusercontent.com/aip-77/aip-77.github.io/main/store/data.xlsx';
    
    // Конфигурация сетки
    const GRID_W = 60; // Максимальная ширина в юнитах (с запасом)
    const GRID_H = 60; // Максимальная высота
    
    let warehouseData = [];
    let zoneBlocks = []; // Массив объектов для отрисовки {x, y, w, h, type, label, addressKey}

    document.addEventListener('DOMContentLoaded', loadData);

    async function loadData() {
        try {
            const response = await fetch(EXCEL_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, {type: 'array'});
            const worksheet = workbook.Sheets[workbook.SheetNames[0]];
            
            const cellC4 = worksheet['C4'];
            document.getElementById('period-info').textContent = cellC4 ? `Период: ${cellC4.v}` : '';

            const rawData = XLSX.utils.sheet_to_json(worksheet, {range: 8, header: 1});
            processData(rawData);
        } catch (error) {
            alert('Ошибка: ' + error.message);
        }
    }

    function processData(rows) {
        warehouseData = [];
        zoneBlocks = [];
        const itemsMap = {}; // Ключ: адрес без яруса (C03-32A), Значение: массив товаров

        // 1. Обработка данных и группировка
        rows.forEach(row => {
            const addrRaw = row[7];
            const name = row[3] || 'Без названия';
            let qty = parseFloat(row[15]);
            if (isNaN(qty)) qty = 0;
            if (!addrRaw) return;

            const addr = String(addrRaw).trim().toUpperCase();
            const match = addr.match(/^([A-E])(\d+)-(\d+)([A-Z])-(\d+)$/);
            
            if (match) {
                const [, zone, pass, cellNum, place, level] = match;
                const shortAddr = `${zone}${pass}-${cellNum}${place}`; // Ключ для блока
                
                warehouseData.push({ fullAddr: addr, shortAddr, name, qty });

                if (!itemsMap[shortAddr]) itemsMap[shortAddr] = [];
                itemsMap[shortAddr].push({ fullAddr: addr, name, qty });
            }
        });

        // 2. Построение геометрии (Топология)
        buildTopology(itemsMap);

        // 3. Отрисовка
        renderMap();
    }

    function buildTopology(itemsMap) {
        // Helper для создания блока
        const addBlock = (x, y, w, h, type, label, addrKey = null) => {
            const hasItems = addrKey && itemsMap[addrKey] && itemsMap[addrKey].length > 0;
            zoneBlocks.push({ x, y, w, h, type, label, addrKey, hasItems });
        };

        // --- ЗОНА C (Пример детальной разметки по вашему ТЗ) ---
        // Проход C03: Start Col 1, Rows 1-19
        // Структура прохода (ширина 10 юнитов):
        // Left: 4 cols (1-4), Passage: 2 cols (5-6), Right: 4 cols (7-10)
        // Wall after col 10 (visualized as gap or thin block)
        
        const c03_x = 1;
        const c02_x = 14; // 1 + 10 (block) + 2 (gap/wall) + 1 (offset)
        const c01_x = 27; 
        
        // Функция для рисования одного прохода зоны C
        const drawCPassage = (startX, passNum, prefix) => {
            // Левая сторона (Четные: 32..02)
            // 16 ячеек. Каждая высота 1 юнит? Нет, по ТЗ 1 строка = 1 ячейка по высоте.
            // Но у нас масштаб. Пусть 1 номер ячейки = 1 юнит высоты.
            // Row 1: Cell 32, Row 2: Cell 30...
            for (let i = 0; i < 16; i++) {
                const cellNum = 32 - (i * 2);
                const yPos = 1 + i;
                // Адрес типа C03-32A. Place A,B,C,D занимают 4 колонки
                // Для упрощения рисуем один блок на 4 колонки, внутри пишем диапазон или первый адрес
                // Если нужно разделение по местам (A,B,C,D), то делим ширину 4 на 4 части.
                // В ТЗ: "сектор... занимает 4 столбца". Значит один блок = 4 ширины.
                addBlock(startX, yPos, 4, 1, 'storage', `${prefix}-${cellNum}`, `${prefix}-${cellNum}A`);
            }

            // Правая сторона (Нечетные: 31..01)
            // Row 1: Cell 31 ...
            for (let i = 0; i < 16; i++) {
                const cellNum = 31 - (i * 2);
                const yPos = 1 + i;
                // Сдвиг по X: startX + 4 (left) + 2 (passage) = startX + 6
                addBlock(startX + 6, yPos, 4, 1, 'storage', `${prefix}-${cellNum}`, `${prefix}-${cellNum}A`);
            }

            // Центральный проход (Cols 5-6 относительно старта)
            addBlock(startX + 4, 1, 2, 1, 'special', `${prefix}-99`, `${prefix}-99A`); // Верхняя спец
            addBlock(startX + 4, 2, 2, 15, 'passage', 'Проезд'); // Основной проезд
            addBlock(startX + 4, 17, 2, 2, 'passage', 'Центр. выезд'); // Ряды 17-18
            addBlock(startX + 4, 19, 2, 1, 'special', `${prefix}-00`, `${prefix}-00A`); // Нижняя спец
        };

        // Рисуем проходы C
        drawCPassage(c03_x, 3, 'C03');
        drawCPassage(c02_x, 2, 'C02');
        drawCPassage(c01_x, 1, 'C01');

        // Стены между проходами (визуальные разделители)
        // Между C03 (end 10) и C02 (start 14) -> gap 11,12,13. Рисуем стену в 11?
        // По ТЗ: "между 10 и 11 ячейкой толстая линия". 
        // Сделаем стену шириной 0.5 или просто отступ. В блочной модели лучше отступ.
        // Добавим блоки-стены для наглядности
        addBlock(c03_x + 10, 1, 0.5, 16, 'wall', ''); 
        addBlock(c02_x + 10, 1, 0.5, 16, 'wall', '');

        // --- ДРУГИЕ ЗОНЫ (Заглушки для примера, можно расширить) ---
        // Зона D (горизонтальная сверху)
        addBlock(40, 1, 15, 4, 'storage', 'Зона D01-D05', 'D01-01A');
        
        // Зона E
        addBlock(40, 20, 15, 4, 'storage', 'Зона E01-E02', 'E01-01A');

        // Зона A&B (большой блок снизу)
        addBlock(1, 40, 30, 10, 'storage', 'Зона A & B', 'A01-01A');
    }

    function renderMap() {
        const mapArea = document.getElementById('map-area');
        const axisTop = document.getElementById('axis-top');
        const axisLeft = document.getElementById('axis-left');
        
        mapArea.innerHTML = '';
        axisTop.innerHTML = '';
        axisLeft.innerHTML = '';

        // Настройка размеров области
        // Найдем макс координаты
        let maxX = 50, maxY = 50;
        zoneBlocks.forEach(b => {
            if (b.x + b.w > maxX) maxX = Math.ceil(b.x + b.w);
            if (b.y + b.h > maxY) maxY = Math.ceil(b.y + b.h);
        });

        const totalW = maxX * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell-w'));
        const totalH = maxY * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell-h'));
        
        mapArea.style.width = `${totalW}px`;
        mapArea.style.height = `${totalH}px`;

        // Генерация осей
        // Буквы (A, B, C...)
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
        for (let i = 1; i <= maxX; i++) {
            const label = document.createElement('div');
            label.className = 'axis-label col';
            label.style.width = `var(--cell-w)`;
            // Логика букв: 1=A, 2=B... 27=AA
            let letterIdx = i - 1;
            let txt = '';
            if (letterIdx < 26) txt = letters[letterIdx];
            else txt = 'A' + letters[letterIdx % 26]; // Упрощенно
            
            label.textContent = txt;
            axisTop.appendChild(label);
        }

        // Цифры (1, 2, 3...)
        for (let i = 1; i <= maxY; i++) {
            const label = document.createElement('div');
            label.className = 'axis-label row';
            label.style.height = `var(--cell-h)`;
            label.textContent = i;
            axisLeft.appendChild(label);
        }

        // Отрисовка блоков
        zoneBlocks.forEach(block => {
            const el = document.createElement('div');
            el.className = `zone-block ${block.type} ${block.hasItems ? 'has-items' : ''}`;
            
            // Позиционирование
            el.style.left = `${(block.x - 1) * 100 / GRID_W * (totalW/maxX)}px`; // Коррекция под % или px
            // Проще через calc в CSS, но тут зададим явно в px基于 unit size
            const unitW = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell-w'));
            const unitH = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell-h'));
            
            el.style.left = `${(block.x - 1) * unitW}px`;
            el.style.top = `${(block.y - 1) * unitH}px`;
            el.style.width = `${block.w * unitW}px`;
            el.style.height = `${block.h * unitH}px`;

            el.textContent = block.label;
            
            if (block.addrKey) {
                el.onclick = () => showDetails(block.addrKey, block.label);
            }

            mapArea.appendChild(el);
        });
    }

    function showDetails(addrKey, label) {
        const items = warehouseData.filter(d => d.shortAddr === addrKey);
        if (items.length === 0) return;

        const modal = document.getElementById('modal');
        const title = document.getElementById('modal-title');
        const body = document.getElementById('modal-body');

        title.textContent = `Сектор: ${label} (${addrKey})`;
        
        let totalQty = 0;
        let html = `<table>
            <thead><tr><th>Полный адрес</th><th>Номенклатура</th><th>Количество</th></tr></thead>
            <tbody>`;
        
        items.forEach(item => {
            totalQty += item.qty;
            html += `<tr>
                <td>${item.fullAddr}</td>
                <td>${item.name}</td>
                <td><strong>${item.qty.toLocaleString()}</strong></td>
            </tr>`;
        });

        html += `</tbody></table>
            <div class="stats-bar">
                <span>Позиций: ${items.length}</span>
                <span>Всего шт: ${totalQty.toLocaleString()}</span>
            </div>`;

        body.innerHTML = html;
        modal.classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }
    document.getElementById('modal').addEventListener('click', e => {
        if (e.target.id === 'modal') closeModal();
    });
</script>

</body>
</html>
