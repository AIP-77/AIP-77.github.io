<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Топология склада - Сетка Excel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --cell-size: 22px; /* Размер клетки */
            --header-bg: #f8f9fa;
            --border-color: #ccc;
            --wall-color: #000;
            --storage-bg: #85c1e9;
            --storage-border: #5dade2;
            --passage-bg: #aed6f1;
            --highlight-bg: #2ecc71; /* Есть товар */
            --highlight-text: #fff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            overflow: auto;
        }

        .header {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Контейнер для сетки с осями */
        .grid-wrapper {
            display: grid;
            /* Первый столбец - номера строк, остальные - данные */
            grid-template-columns: 40px repeat(50, var(--cell-size)); 
            /* Первая строка - буквы, остальные - данные */
            grid-template-rows: 30px repeat(50, var(--cell-size));
            background: white;
            border: 1px solid #999;
            width: fit-content;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Заголовки (Буквы и Цифры) */
        .axis-corner {
            background: var(--header-bg);
            border-right: 1px solid #999;
            border-bottom: 1px solid #999;
            position: sticky;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .axis-col {
            background: var(--header-bg);
            border-bottom: 1px solid #999;
            border-right: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #555;
            position: sticky;
            top: 0;
            z-index: 90;
        }

        .axis-row {
            background: var(--header-bg);
            border-right: 1px solid #999;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #555;
            position: sticky;
            left: 0;
            z-index: 90;
        }

        /* Ячейки сетки */
        .cell {
            border: 1px solid #eee;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            overflow: hidden;
            white-space: nowrap;
            transition: all 0.1s;
            background: white;
        }

        .cell:hover {
            outline: 2px solid #e74c3c;
            z-index: 10;
            transform: scale(1.1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Типы ячеек */
        .cell.storage {
            background: var(--storage-bg);
            border: 1px solid var(--storage-border);
            color: #1a5276;
            font-weight: bold;
        }

        .cell.has-items {
            background: var(--highlight-bg) !important;
            color: var(--highlight-text);
            border-color: #27ae60;
        }

        .cell.wall {
            background: var(--wall-color);
            border: none;
            z-index: 5;
        }

        .cell.passage {
            background: var(--passage-bg);
            opacity: 0.6;
        }

        .cell.special {
            background: #f9e79f;
            border-color: #f1c40f;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="header">
    <div>
        <h1>🗺️ Топология склада (Зоны C)</h1>
        <div id="period-info" style="color: #7f8c8d;">Загрузка...</div>
    </div>
    <button onclick="location.reload()" style="padding: 8px 15px; cursor:pointer;">🔄 Обновить</button>
</div>

<div class="grid-wrapper" id="grid-container">
    <!-- Генерируется JS -->
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h2 id="modal-title" style="margin:0;">Сектор</h2>
            <button onclick="closeModal()" style="background:none; border:none; font-size:20px; cursor:pointer;">&times;</button>
        </div>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const EXCEL_URL = 'https://raw.githubusercontent.com/aip-77/aip-77.github.io/main/store/data.xlsx';
    let gridData = {}; // Ключ "row-col" -> { address, items: [] }

    // Маппинг букв Excel: 1->A, 2->B ... 27->AA
    function getColLabel(n) {
        let s = "";
        while (n > 0) {
            let m = (n - 1) % 26;
            s = String.fromCharCode(65 + m) + s;
            n = Math.floor((n - 1) / 26);
        }
        return s;
    }

    document.addEventListener('DOMContentLoaded', loadData);

    async function loadData() {
        try {
            const response = await fetch(EXCEL_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, {type: 'array'});
            const ws = workbook.Sheets[workbook.SheetNames[0]];
            
            document.getElementById('period-info').textContent = ws['C4'] ? `Период: ${ws['C4'].v}` : '';

            const rawData = XLSX.utils.sheet_to_json(ws, {range: 8, header: 1});
            processData(rawData);
        } catch (e) {
            alert("Ошибка: " + e.message);
        }
    }

    function processData(rows) {
        gridData = {};
        
        rows.forEach(row => {
            const addrRaw = row[7]; // H
            const name = row[3];    // D
            let qty = parseFloat(row[15]); // P
            if (isNaN(qty)) qty = 0;
            if (!addrRaw) return;

            const addr = String(addrRaw).trim().toUpperCase();
            // Парсинг: C03-32A-1
            const match = addr.match(/^([C])(\d+)-(\d+)([A-Z])-(\d+)$/);
            if (!match) return;

            const [, zone, passStr, cellNum, place, level] = match;
            const pass = parseInt(passStr);
            
            // Получаем координаты в сетке
            const coords = getCoords(pass, cellNum, place);
            if (!coords) return;

            // Заполняем все клетки, которые занимает этот сектор
            // Стандартный сектор: 4 клетки шириной, 1 высотой
            // Спец (00, 99): 2 клетки шириной
            const isSpecial = (cellNum === 0 || cellNum === 99);
            const width = isSpecial ? 2 : 4;
            
            // Адрес для отображения (без яруса)
            const displayAddr = `${zone}${pass}-${cellNum}${place}`;

            for (let c = 0; c < width; c++) {
                const key = `${coords.row}-${coords.col + c}`;
                if (!gridData[key]) {
                    gridData[key] = {
                        address: displayAddr,
                        fullAddrBase: `${zone}${pass}-${cellNum}${place}`,
                        items: [],
                        isMain: (c === 0) // Флаг, что это главная клетка для клика
                    };
                }
                // Добавляем товар только в основную клетку, чтобы не дублировать в модалке
                if (c === 0) {
                    gridData[key].items.push({ name, qty, full: addr });
                }
            }
        });

        renderGrid();
    }

    function getCoords(pass, cellNum, place) {
        // Базовые смещения по столбцам (1-based index для грида, где 1-й это оси)
        // Реальные данные начинаются со 2-го столбца грида (индекс 1 в массиве, но визуально col 1)
        // Пусть Col 1 = A.
        
        let startCol = 0;
        if (pass === 3) startCol = 1;       // A (1)
        else if (pass === 2) startCol = 14; // N (14) (после K=11, L=12, M=13)
        else if (pass === 1) startCol = 27; // AA (27) (после X=24, Y=25, Z=26)
        else return null;

        // Логика рядов (1-16)
        // Левая сторона (Четные: 32..2) -> Rows 1..16
        // Правая сторона (Нечетные: 31..1) -> Rows 1..16 (или 2..16?)
        // По ТЗ: 
        // Left: 1-4 / 1 -> 32. Значит Row = 1 + (32 - cell)/2
        // Right: 7-10 / 1 -> 31. Значит Row = 1 + (31 - cell)/2
        
        // Позиция внутри прохода (0..10)
        // 0-3: Left Block (4 cols)
        // 4-5: Center Passage (2 cols) - обычно пусто или спец
        // 6-9: Right Block (4 cols)
        
        let row = 0;
        let colOffset = 0;

        // Левый блок (Четные)
        if (cellNum % 2 === 0 && cellNum >= 2 && cellNum <= 32) {
            row = 1 + (32 - cellNum) / 2;
            colOffset = 0; // Занимает 0,1,2,3 относительно старта
        }
        // Правый блок (Нечетные)
        else if (cellNum % 2 !== 0 && cellNum >= 1 && cellNum <= 31) {
            row = 1 + (31 - cellNum) / 2;
            colOffset = 6; // Занимает 6,7,8,9 относительно старта (пропуск 4,5)
        }
        // Спец ячейки
        else if (cellNum === 99) {
            row = 1;
            colOffset = 4; // Центр, 2 клетки (4,5)
        }
        else if (cellNum === 0) {
            row = 19;
            colOffset = 4;
        }
        else {
            return null; // Неизвестная ячейка
        }

        return { row: row, col: startCol + colOffset };
    }

    function renderGrid() {
        const container = document.getElementById('grid-container');
        container.innerHTML = '';

        // 1. Угол (0,0)
        const corner = document.createElement('div');
        corner.className = 'axis-corner';
        container.appendChild(corner);

        // 2. Заголовки столбцов (A..AY)
        for (let c = 1; c <= 50; c++) {
            const el = document.createElement('div');
            el.className = 'axis-col';
            el.textContent = getColLabel(c);
            container.appendChild(el);
        }

        // 3. Строки
        for (let r = 1; r <= 50; r++) {
            // Заголовок строки (цифра)
            const rowHeader = document.createElement('div');
            rowHeader.className = 'axis-row';
            rowHeader.textContent = r;
            container.appendChild(rowHeader);

            // Ячейки
            for (let c = 1; c <= 50; c++) {
                const key = `${r}-${c}`;
                const data = gridData[key];
                const el = document.createElement('div');
                el.className = 'cell';

                // Определение типа ячейки
                let isWall = false;
                // Стены после K(11), X(24), AK(37) между рядами 1-16
                if ((c === 11 || c === 24 || c === 37) && r >= 1 && r <= 16) {
                    isWall = true;
                }
                // Разделители пустых зон (M=13, Z=26) можно сделать чуть шире или просто оставить пустыми
                
                if (isWall) {
                    el.classList.add('wall');
                } else if (data) {
                    el.classList.add('storage');
                    if (data.items.length > 0) {
                        el.classList.add('has-items');
                    }
                    // Текст только в главной ячейке (чтобы не дублировался)
                    if (data.isMain) {
                        el.textContent = data.address;
                        el.onclick = () => showModal(data);
                    } else {
                        // Для остальных клеток блока просто стиль
                        el.style.cursor = 'default';
                    }
                    
                    // Если это спец ячейка (00, 99), объединяем визуально? 
                    // В гриде просто красим соседние клетки одинаково
                } else {
                    // Проверка на центральный проход внутри стеллажа (cols 5-6 от старта)
                    // Это сложно вычислить без обратного маппинга, оставим белым или passage
                    // Для простоты: если нет данных и не стена - пусто
                }

                container.appendChild(el);
            }
        }
    }

    function showModal(data) {
        const modal = document.getElementById('modal');
        const title = document.getElementById('modal-title');
        const body = document.getElementById('modal-body');

        title.textContent = `Сектор: ${data.address}`;
        
        if (data.items.length === 0) {
            body.innerHTML = '<p>Нет товаров в этом секторе.</p>';
        } else {
            let total = 0;
            let html = `<table><thead><tr><th>Полный адрес</th><th>Номенклатура</th><th>Кол-во</th></tr></thead><tbody>`;
            data.items.forEach(i => {
                total += i.qty;
                html += `<tr><td>${i.full}</td><td>${i.name}</td><td><b>${i.qty.toLocaleString()}</b></td></tr>`;
            });
            html += `</tbody></table><div style="margin-top:10px; font-weight:bold;">Итого: ${total.toLocaleString()} шт.</div>`;
            body.innerHTML = html;
        }
        modal.classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }
    document.getElementById('modal').addEventListener('click', e => {
        if(e.target.id === 'modal') closeModal();
    });
</script>

</body>
</html>
