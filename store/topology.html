<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Топология склада - Схема 50x50</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --cell-size: 20px; /* Оптимальный размер для производительности */
            --header-bg: #e0e0e0;
            --border-color: #999;
            --wall-color: #333;
            --storage-bg: #85c1e9;
            --storage-active: #2ecc71;
            --passage-bg: #aed6f1;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 20px;
            overflow: auto;
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            padding: 8px 16px;
            background: #2c3e50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Контейнер сетки */
        .grid-wrapper {
            display: inline-block;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Основная сетка */
        .warehouse-grid {
            display: grid;
            /* 50 колонок + 1 для номеров строк */
            grid-template-columns: 40px repeat(50, var(--cell-size)); 
            /* 50 строк + 1 для букв колонок */
            grid-template-rows: 30px repeat(50, var(--cell-size));
            border-top: 1px solid var(--border-color);
            border-left: 1px solid var(--border-color);
        }

        .cell {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            text-align: center;
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            box-sizing: border-box;
        }

        /* Заголовки (Excel style) */
        .header-col {
            background: var(--header-bg);
            font-weight: bold;
            color: #555;
            border-right: 1px solid #bbb;
            border-bottom: 1px solid #bbb;
        }

        .header-row {
            background: var(--header-bg);
            font-weight: bold;
            color: #555;
            border-right: 1px solid #bbb;
            border-bottom: 1px solid #bbb;
        }

        .corner-cell {
            background: #ccc;
            border-right: 1px solid #bbb;
            border-bottom: 1px solid #bbb;
        }

        /* Типы ячеек */
        .cell.storage {
            background: var(--storage-bg);
            color: #1a5276;
            font-weight: 600;
            cursor: pointer;
            z-index: 1;
        }

        .cell.storage.has-items {
            background: var(--storage-active);
            color: white;
            border: 2px solid #27ae60;
            z-index: 2;
        }

        .cell.passage {
            background: var(--passage-bg);
        }

        /* Стена - визуальная граница */
        .cell.wall {
            background: var(--wall-color);
            border: none;
            z-index: 3;
        }

        .cell.empty {
            background: #fff;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 80%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 8px; border: 1px solid #ddd; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="controls">
    <h2>🗺️ Топология склада</h2>
    <span id="period-info" style="margin-left: 20px; color: #666;"></span>
    <button onclick="location.reload()">🔄 Обновить</button>
    <button onclick="window.location.href='store2.html'">📊 Поиск</button>
</div>

<div class="grid-wrapper">
    <div id="grid" class="warehouse-grid"></div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <h3 id="modal-title">Адрес</h3>
            <button onclick="document.getElementById('modal').classList.remove('active')" style="background:none; color:#333; font-size:20px;">✕</button>
        </div>
        <div id="modal-body"></div>
    </div>
</div>

<script>
    const EXCEL_URL = 'https://raw.githubusercontent.com/aip-77/aip-77.github.io/main/store/data.xlsx';
    let gridData = {}; // Хранит данные: "row-col" -> { address, items: [] }

    document.addEventListener('DOMContentLoaded', loadData);

    async function loadData() {
        try {
            const response = await fetch(EXCEL_URL);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, {type: 'array'});
            const ws = workbook.Sheets[workbook.SheetNames[0]];
            
            document.getElementById('period-info').textContent = ws['C4'] ? `Период: ${ws['C4'].v}` : '';

            const rawData = XLSX.utils.sheet_to_json(ws, {range: 8, header: 1});
            processData(rawData);
        } catch (e) {
            alert('Ошибка: ' + e.message);
        }
    }

    function processData(rows) {
        gridData = {};
        rows.forEach(row => {
            const addrRaw = row[7]; // H
            const name = row[3] || '-'; // D
            const qty = parseFloat(row[15]) || 0; // P
            
            if (!addrRaw) return;
            const addr = String(addrRaw).trim().toUpperCase();
            // Парсинг: C03-32A-1
            const m = addr.match(/^([A-E])(\d+)-(\d+)([A-Z])-(\d+)$/);
            if (!m) return;

            const [, zone, passStr, cellNumStr, place, level] = m;
            const pass = parseInt(passStr);
            const cellNum = parseInt(cellNumStr);

            // Получаем координаты в сетке
            const coords = getCoords(zone, pass, cellNum, place);
            if (!coords) return;

            // Ключ для сетки (row-col)
            // Если ячейка широкая (например 4 колонки), записываем в первую
            const key = `${coords.r}-${coords.c}`;
            
            if (!gridData[key]) {
                gridData[key] = {
                    displayAddr: `${zone}${pass}-${cellNum}${place}`,
                    fullAddrBase: `${zone}${pass}-${cellNum}${place}`,
                    items: [],
                    span: coords.span || 1 // Сколько колонок занимает
                };
            }
            gridData[key].items.push({ name, qty, full: addr });
        });

        renderGrid();
    }

    // Расчет координат
    function getCoords(zone, pass, cellNum, place) {
        if (zone !== 'C') return null;

        // Базовые отступы для проходов (с учетом стены в 1 колонку визуально, но логически разрыв)
        // Проход 1: cols 2-13 (12 колонок: 4 лев + 2 центр + 4 прав + 2 промежутки?)
        // По ТЗ: Стандарт 4 столбца. Стена между проходами.
        // Давайте сделаем жесткую привязку:
        // Проход C03: startCol = 2
        // Проход C02: startCol = 15 (после 12 колонок контента + 1 стена)
        // Проход C01: startCol = 28
        
        let startCol = 0;
        if (pass === 3) startCol = 2;
        else if (pass === 2) startCol = 15;
        else if (pass === 1) startCol = 28;
        else return null;

        // Логика рядов (Rows 2..50, так как Row 1 заголовки)
        // Спец ячейки 99 и 00 занимают 2 столбца в центре (cols 5-6 относительно старта)
        // Обычные ячейки 4 столбца.
        
        // Относительные координаты внутри прохода (ширина 12 ячеек: 1-4 лево, 5-6 центр, 7-10 право, 11-12 резерв/стена?)
        // По ТЗ: "между 10 и 11 ячейкой толстая черная линия". Значит проход шириной 10? 
        // Но стандарт 4 столбца. 4 (лев) + 2 (центр) + 4 (прав) = 10. Идеально.
        
        const pCode = place.charCodeAt(0) - 'A'.charCodeAt(0); // 0 for A, 1 for B...

        // 1. Левый блок (ячейки 32, 30... 02) - Rows 2..17
        // Занимает cols 1-4 относительно старта
        if (cellNum % 2 === 0 && cellNum >= 2 && cellNum <= 32) {
            const rowOffset = 1 + (32 - cellNum) / 2; // 1..16
            const r = 1 + rowOffset; // Глобальный ряд (с учетом заголовка)
            const c = startCol + pCode; // 0..3
            if (pCode < 4) return { r, c, span: 1 };
        }

        // 2. Правый блок (ячейки 31, 29... 01) - Rows 2..17
        // Занимает cols 7-10 относительно старта (пропуск 5-6)
        if (cellNum % 2 !== 0 && cellNum >= 1 && cellNum <= 31) {
            const rowOffset = 1 + (31 - cellNum) / 2;
            const r = 1 + rowOffset;
            const c = startCol + 6 + pCode; // Сдвиг на 6 (4 лев + 2 центр)
            if (pCode < 4) return { r, c, span: 1 };
        }

        // 3. Центр спец (99) - Row 2, cols 5-6
        if (cellNum === 99) {
            return { r: 2, c: startCol + 4, span: 2 }; // Занимает 2 колонки
        }

        // 4. Центр спец (00) - Row 20 (по ТЗ "начиная с 20 строки цифры стоят правильно", значит 00 выше?)
        // В ТЗ: "1-30/17-18 центральный проезд", "1-10/19 - C03-00A". 
        // Значит 00 на 19 ряду глобально (индекс 20 в гриде с заголовком? Нет, заголовок 1, данные с 2).
        // Ряд 19 в данных = Grid Row 20.
        if (cellNum === 0 || cellNum === 100) {
             return { r: 20, c: startCol + 4, span: 2 };
        }

        // 5. Проход внутри (центр 5-6) для обычных рядов - просто пустота, но можно вернуть координаты для покраски
        // Rows 2..17, cols 5-6
        // Возвращаем null, чтобы отрисовать как passage в рендере, если нужно, или обрабатывать отдельно
        
        return null;
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        const fragment = document.createDocumentFragment();

        // 1. Угловая ячейка (0,0)
        const corner = document.createElement('div');
        corner.className = 'cell corner-cell';
        fragment.appendChild(corner);

        // 2. Заголовки колонок (A, B, C...)
        for (let c = 1; c <= 50; c++) {
            const h = document.createElement('div');
            h.className = 'cell header-col';
            h.textContent = numToCol(c);
            fragment.appendChild(h);
        }

        // 3. Строки
        for (let r = 1; r <= 50; r++) {
            // Заголовок строки (цифра)
            const rowHeader = document.createElement('div');
            rowHeader.className = 'cell header-row';
            rowHeader.textContent = r;
            fragment.appendChild(rowHeader);

            // Ячейки строки
            for (let c = 1; c <= 50; c++) {
                const key = `${r}-${c}`;
                const data = gridData[key];
                
                const cell = document.createElement('div');
                cell.className = 'cell empty';

                // Проверка на стену (между проходами)
                // Стены после 12-й колонки каждого блока (startCol + 10 и startCol + 11?)
                // Блок 12 колонок. Стена должна быть视觉上 между ними.
                // Пусть стена будет колонкой 13, 26, 39...
                if ([14, 27, 40].includes(c)) {
                    cell.className = 'cell wall';
                    // Растянем стену на высоту зоны (rows 2-18)
                    if (r >= 2 && r <= 18) cell.style.background = '#333';
                    else cell.style.background = 'transparent'; 
                } 
                else if (data) {
                    cell.className = 'cell storage';
                    cell.textContent = data.displayAddr;
                    if (data.items.length > 0) {
                        cell.classList.add('has-items');
                        if(data.items.length > 1) cell.textContent += ` [${data.items.length}]`;
                    }
                    
                    // Если ячейка широкая (span > 1), объединяем визуально (просто не рисуем границы следующих)
                    if (data.span > 1) {
                        cell.style.gridColumnEnd = `span ${data.span}`;
                        // Пропускаем следующую итерацию цикла для этой ячейки? 
                        // В grid это делается через CSS, но цикл все равно идет.
                        // Чтобы не создать лишние div-ы, можно использовать флаг, но проще оставить пустыми следующие
                        // или использовать CSS grid-area. 
                        // Для простоты: следующий цикл создаст пустую ячейку, но мы можем её скрыть если она часть span.
                        // Но в нашей логике gridData ключ только один. 
                        // Сделаем хак: если текущая ячейка имеет span, то следующие (c+1) игнорируем? 
                        // Сложно в одном цикле. Оставим как есть, CSS grid справится, если не создавать лишний DOM.
                        // Правильнее: проверять, не является ли текущая (r,c) частью предыдущего span.
                    }
                    
                    cell.onclick = () => showModal(data);
                } 
                else {
                    // Проверка на проход (центр 5-6 относительного блока)
                    // Относительно startCol: 5 и 6.
                    // Глобально: startCol+4, startCol+5
                    // Для C03 (start=2): cols 6,7. Для C02 (15): 19,20. Для C01 (28): 32,33.
                    // И ряды 2-17
                    const isPassageCenter = (r >= 2 && r <= 17) && 
                        ([6, 7, 19, 20, 32, 33].includes(c));
                    
                    if (isPassageCenter) {
                        cell.className = 'cell passage';
                    }
                    
                    // Центральный проезд (ряды 18-19 глобально? По ТЗ 17-18 в данных -> 18-19 grid)
                    if (r >= 18 && r <= 19) {
                         cell.className = 'cell passage';
                         cell.style.background = '#fff'; // Широкий проезд
                    }
                }

                // Оптимизация: если предыдущая ячейка в этой строке имела span и покрывает текущую колонку
                // Это сложно отследить без lookahead. 
                // Проще: в gridData хранить ключи только для стартовых ячеек.
                // А в цикле проверять: если (r, c-1) имела span и покрывает c, то не создавать div?
                // Grid Layout сам схлопнет, если задать grid-column: span. Но лишний div будет мешать кликам.
                // Оставим пока так, кликать будем только на storage.
                
                fragment.appendChild(cell);
            }
        }

        grid.appendChild(fragment);
    }

    function numToCol(n) {
        let s = '';
        while (n > 0) {
            n--;
            s = String.fromCharCode(65 + (n % 26)) + s;
            n = Math.floor(n / 26);
        }
        return s;
    }

    function showModal(data) {
        const m = document.getElementById('modal');
        document.getElementById('modal-title').textContent = `Ячейка: ${data.displayAddr}`;
        const body = document.getElementById('modal-body');
        
        let total = 0;
        let html = `<table><thead><tr><th>Полный адрес</th><th>Товар</th><th>Кол-во</th></tr></thead><tbody>`;
        data.items.forEach(i => {
            total += i.qty;
            html += `<tr><td>${i.full}</td><td>${i.name}</td><td><b>${i.qty.toLocaleString()}</b></td></tr>`;
        });
        html += `</tbody></table><div style="margin-top:10px; font-weight:bold;">Итого: ${total.toLocaleString()}</div>`;
        
        body.innerHTML = html;
        m.classList.add('active');
    }
</script>

</body>
</html>
