<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки — Склад Статы</title>
    <meta name="theme-color" content="#1a73e8">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="apple-touch-icon" href="../favicon.png">
    <link rel="manifest" href="../manifest.json">
    <style>
        /* Повторяем структуру как выше */
        :root{--bg-primary:#f0f2f5;--bg-secondary:#ffffff;--text-primary:#333333;--accent-color:#1a73e8;--border-color:#e0e0e0;}
        [data-theme="dark"]{--bg-primary:#121212;--bg-secondary:#1e1e1e;--text-primary:#e0e0e0;--accent-color:#3d8bfd;--border-color:#333333;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;padding-top:60px;}
        .page-container{max-width:800px;margin:0 auto;padding:40px 20px;}
        .page-header{margin-bottom:30px;padding-bottom:20px;border-bottom:2px solid var(--border-color);}
        .page-title{font-size:2em;color:var(--accent-color);margin-bottom:10px;}
        .settings-panel{background:var(--bg-secondary);padding:30px;border-radius:16px;box-shadow:0 2px 15px rgba(0,0,0,0.08);}
        .setting-group{margin-bottom:30px;padding-bottom:20px;border-bottom:1px solid var(--border-color);}
        .setting-group:last-child{border:none;margin-bottom:0;padding-bottom:0;}
        .setting-title{font-size:1.2em;font-weight:600;margin-bottom:15px;color:var(--accent-color);}
        .setting-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;}
        .setting-label{color:var(--text-secondary);}
        .toggle-switch{position:relative;width:50px;height:26px;background:var(--border-color);border-radius:13px;cursor:pointer;}
        .toggle-switch::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;background:white;border-radius:50%;transition:left 0.2s;}
        .toggle-switch.active{background:var(--accent-color);}
        .toggle-switch.active::after{left:27px;}
        .back-button{position:fixed;top:20px;left:20px;padding:10px 20px;background:var(--accent-color);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;z-index:1000;}
        .theme-toggle-wrapper{position:fixed;top:20px;right:20px;z-index:100;}
        .theme-toggle-btn{background:var(--accent-color);color:white;border:none;padding:12px 20px;border-radius:8px;cursor:pointer;font-size:1em;}
    </style>
</head>
<body>
    <button class="back-button" onclick="window.location.href='index.html'">← На главную</button>
    
    <div class="theme-toggle-wrapper">
        <button class="theme-toggle-btn" id="themeToggle">🌙 Тёмная</button>
    </div>
    
    <div class="page-container">
        <header class="page-header">
            <h1 class="page-title">⚙️ Настройки системы</h1>
            <p style="color:var(--text-secondary)">Конфигурация отображения и уведомлений</p>
        </header>
        
        <div class="settings-panel">
            <div class="setting-group">
                <div class="setting-title">Отображение</div>
                <div class="setting-row">
                    <span class="setting-label">Тёмная тема</span>
                    <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Компактный режим графиков</span>
                    <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
                </div>
            </div>
            
            <div class="setting-group">
                <div class="setting-title">Уведомления</div>
                <div class="setting-row">
                    <span class="setting-label">Звуковые предупреждения</span>
                    <div class="toggle-switch active" onclick="this.classList.toggle('active')"></div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Автообновление</span>
                    <div class="toggle-switch" onclick="this.classList.toggle('active')"></div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Интервал автообновления</span>
                    <select class="setting-select" style="padding:6px 10px;border-radius:4px;border:1px solid var(--border-color);">
                        <option>Не автоматическое</option>
                        <option selected>1 минута</option>
                        <option>5 минут</option>
                        <option>10 минут</option>
                    </select>
                </div>
            </div>
            
            <div class="setting-group">
                <div class="setting-title">Общие</div>
                <div class="setting-row">
                    <span class="setting-label">Формат времени</span>
                    <select class="setting-select" style="padding:6px 10px;border-radius:4px;border:1px solid var(--border-color);">
                        <option selected>24 часа (09:00)</option>
                        <option>12 часов (09:00 AM)</option>
                    </select>
                </div>
                <div class="setting-row">
                    <span class="setting-label">Единицы измерения</span>
                    <select class="setting-select" style="padding:6px 10px;border-radius:4px;border:1px solid var(--border-color);">
                        <option selected>Штуки (шт)</option>
                        <option>Килограммы (кг)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        (function(){
            const THEME_KEY='warehouse_theme';
            function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem(THEME_KEY,t);}
            function initTheme(){
                const s=localStorage.getItem(THEME_KEY);
                if(!s&&window.matchMedia&&(window.matchMedia('(prefers-color-scheme:dark)').matches))setTheme('dark');
                else if(s)setTheme(s);else setTheme('light');
            }
            initTheme();
            document.getElementById('themeToggle').addEventListener('click',()=>{
                setTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light');
            });
        })();
        if('serviceWorker'in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('../sw.js').catch(e=>console.log('SW error:',e)));}
    </script>
</body>
</html>
