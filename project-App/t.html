const THEME_KEY = 'warehouse_theme'; // Имя для localStorage

function initTheme() {
    // Проверяем есть ли сохранённая тема
    const savedTheme = localStorage.getItem(THEME_KEY);
    
    // Если нет — проверяем системные настройки
    if (!savedTheme) {
        if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            setTheme('dark');
        } else {
            setTheme('light');
        }
    } else {
        setTheme(savedTheme);
    }
}

function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem(THEME_KEY, theme);
    updateThemeButtonText();
}

function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    setTheme(newTheme);
    
    // 🎉 Анимация смены
    animateThemeSwitch(newTheme);
}

function updateThemeButtonText() {
    const btn = document.getElementById('themeToggle');
    if (!btn) return;
    
    const theme = document.documentElement.getAttribute('data-theme') || 'light';
    const icon = btn.querySelector('.theme-icon');
    const text = btn.querySelector('.theme-text');
    
    if (theme === 'dark') {
        icon.textContent = '☀️';
        text.textContent = 'Светлая';
    } else {
        icon.textContent = '🌙';
        text.textContent = 'Тёмная';
    }
}

function animateThemeSwitch(theme) {
    const container = document.querySelector('.container');
    
    // Эффект вспышки при смене
    container.style.transition = 'all 0.3s ease';
    container.style.transform = 'scale(0.99)';
    
    setTimeout(() => {
        container.style.transform = 'scale(1)';
    }, 300);
}

function exportToCSV(selectedDate) {
    if (!selectedDate || !jsonData) {
        setStatus('❌ Нет данных для экспорта', 'error');
        return;
    }
    
    try {
        const data = calculateDataForDate(selectedDate);
        const headers = ['Час', 'Сборка_Шин', 'Сборка_Диски', 'Погрузка', 'Стикеровка', 'Упаковка', 
                        'Бригады_Шин', 'Бригады_Диски', 'Бригады_Погрузка', 'Бригады_Стикеровка', 'Бригады_Упаковка'];
        
        let csvContent = headers.join(',') + '\n';
        
        for (let i = 0; i < 24; i++) {
            const row = [
                labels[i],
                data.assembly[i],
                data.assembly_rim[i],
                data.loading[i],
                data.stickering[i],
                data.palletizing[i],
                Math.ceil(data.assembly[i] / norms.assembly),
                Math.ceil(data.assembly_rim[i] / norms.assembly_rim),
                Math.ceil(data.loading[i] / norms.loading),
                Math.ceil(data.stickering[i] / norms.stickering),
                Math.ceil(data.palletizing[i] / norms.palletizing)
            ];
            csvContent += row.join(',') + '\n';
        }
        
        // Создаем файл для скачивания
        const blob = new Blob(['\ufeff' + csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        const url = URL.createObjectURL(blob);
        
        link.setAttribute('href', url);
        link.setAttribute('download', `Склад_Нагрузки_${selectedDate}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        setStatus('✅ Данные экспортированы!', 'success');
        
        // Анимация кнопки
        const exportBtn = document.getElementById('exportBtn');
        exportBtn.classList.add('export-success');
        setTimeout(() => exportBtn.classList.remove('export-success'), 300);
        
    } catch (error) {
        console.error('Ошибка экспорта:', error);
        setStatus('❌ Ошибка экспорта: ' + error.message, 'error');
    }
}

   function calculateDataForDate(selectedDate) {
        const result = { 
            assembly: Array(24).fill(0), 
            loading: Array(24).fill(0), 
            stickering: Array(24).fill(0), 
            palletizing: Array(24).fill(0),
            assembly_rim: Array(24).fill(0), 
            
        };
        
        const dateCol = jsonData.columns.indexOf('Рабочий день');
        const timeCol = jsonData.columns.indexOf('Начало задачи');
        const workCol = jsonData.columns.indexOf('Вид работ');
        const qtyCol = jsonData.columns.indexOf('ps.');

        jsonData.data.forEach(row => {
            if (row[dateCol] !== selectedDate) return;
            const workTypeRaw = row[workCol] || '';
            const key = workTypeMap[workTypeRaw];
            if (!key) return;
            const hourLabel = getHourLabel(row[timeCol]);
            if (!hourLabel) return;
            const hourIdx = labels.indexOf(hourLabel);
            if (hourIdx === -1) return;
            const qty = parseFloat(row[qtyCol]) || 0;
            result[key][hourIdx] += qty;
        });
        return result;
    }

// 🔔 Функция проверки перегрузки
function checkOverload(selectedDate) {
    if (!selectedDate || !jsonData) return [];
    
    const data = calculateDataForDate(selectedDate);
    const overloads = [];
    
    // Конфигурация для проверки
    const overloadConfig = [
        { key: 'assembly', name: 'Сборка Шин', norm: norms.assembly, max: 3 },
        { key: 'assembly_rim', name: 'Сборка Диски', norm: norms.assembly_rim, max: 1 },
        { key: 'loading', name: 'Погрузка', norm: norms.loading, max: 1 },
        { key: 'stickering', name: 'Стикеровка', norm: norms.stickering, max: 1 },
        { key: 'palletizing', name: 'Упаковка', norm: norms.palletizing, max: 1 }
    ];
    
    overloadConfig.forEach(config => {
        data[config.key].forEach((volume, hourIndex) => {
            if (volume > 0) {
                const brigadesNeeded = Math.ceil(volume / config.norm);
                if (brigadesNeeded > config.max) {
                    overloads.push({
                        workType: config.name,
                        hour: labels[hourIndex],
                        hourIndex: hourIndex,
                        volume: volume,
                        brigadesNeeded: brigadesNeeded,
                        brigadesMax: config.max,
                        overloadLevel: brigadesNeeded - config.max,
                        severity: brigadesNeeded > config.max * 2 ? 'critical' : 'warning'
                    });
                }
            }
        });
    });
    
    // Сортировка по критичности
    overloads.sort((a, b) => {
        if (a.severity === 'critical' && b.severity !== 'critical') return -1;
        if (a.severity !== 'critical' && b.severity === 'critical') return 1;
        return b.overloadLevel - a.overloadLevel;
    });
    
    return overloads;
}

// 🔔 Функция отображения панели перегрузки
function showOverloadPanel(overloads) {
    const panel = document.getElementById('overloadPanel');
    const content = document.getElementById('overloadContent');
    
    if (overloads.length === 0) {
        panel.style.display = 'none';
        return;
    }
    
    panel.style.display = 'block';
    
    // Ограничиваем до 10 самых критичных
    const displayOverloads = overloads.slice(0, 10);
    
    content.innerHTML = displayOverloads.map(item => `
        <div class="overload-item ${item.severity}">
            <div>
                <div class="overload-work">${item.workType}</div>
                <div class="overload-time">🕐 ${item.hour} | ${item.volume} шт.</div>
            </div>
            <div class="overload-brigades">
                ${item.brigadesNeeded} из ${item.brigadesMax} бриг.
            </div>
        </div>
    `).join('');
    
    // 🆕 Звуковое уведомление (опционально)
    if (overloads.some(o => o.severity === 'critical')) {
        playNotificationSound();
    }
}

// 🔔 Закрыть панель
function closeOverloadPanel() {
    document.getElementById('overloadPanel').style.display = 'none';
}

// 🔔 Звуковое уведомление (опционально)
function playNotificationSound() {
    // Создаем короткий звуковой сигнал
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const oscillator = audioContext.createOscillator();
    const gainNode = audioContext.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioContext.destination);
    
    oscillator.frequency.value = 800;
    oscillator.type = 'sine';
    gainNode.gain.value = 0.1;
    
    oscillator.start();
    setTimeout(() => oscillator.stop(), 200);
}

// 🔔 Добавить индикатор перегрузки в заголовок секции
function addOverloadIndicators(overloads) {
    // Сбрасываем все индикаторы
    document.querySelectorAll('.overload-indicator').forEach(el => el.remove());
    
    // Группируем по типам работ

            overloadByWork[item.workType] = 0;

}

                    callbacks: {
                        label: function(context) {
                            if (context.parsed.y !== null) {
                                if (context.datasetIndex === 1) {
                                    const brigades = Math.ceil(context.parsed.y / config.norm);
                                    const volume = context.parsed.y;
                                    const lines = [
                                        `Требуется ресурс: ${brigades} бриг./час`,
                                        `${volume} шт. (по норме)`
                                    ];
                                    if (brigades > config.maxBrigades) {
                                        lines.push('⚠️ Перегрузка!');
                                    }
                                    return lines;
                                } else {
                                    return `Объем (шт): ${context.parsed.y}`;
                                }
                            }
                            return context.dataset.label;
                        }
                    }
                }
            }
        }
    });
    
    return shiftCharts[canvasId];
}

// 🆕 Функция инициализации сворачивания графиков
function initChartToggles() {
    const toggleButtons = document.querySelectorAll('.toggle-btn');
    
    toggleButtons.forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation(); // 🆕 Останавливаем всплытие
            const targetId = this.getAttribute('data-target');
            const content = document.getElementById(`content-${targetId}`);
            const icon = this.querySelector('.toggle-icon');
            const text = this.querySelector('.toggle-text');
            
            // Переключаем класс collapsed
            content.classList.toggle('collapsed');
            this.classList.toggle('collapsed');
            
            // Меняем текст кнопки
            if (content.classList.contains('collapsed')) {
                text.textContent = 'Развернуть';
                // Останавливаем анимацию графика при сворачивании
                if (charts[targetId]) {
                    charts[targetId].stop();
                }
            } else {
                text.textContent = 'Свернуть';
                // 🆕 Обновляем график при разворачивании
                setTimeout(() => {
                    if (charts[targetId]) {
                        charts[targetId].resize();
                    }
                    // 🆕 Для сменных графиков
                    Object.keys(shiftCharts).forEach(key => {
                        if (key.includes(targetId)) {
                            shiftCharts[key].resize();
                        }
                    });
                }, 350);
            }
        });
        
        // 🆕 Клик по заголовку тоже сворачивает (исправлено!)
        const header = btn.closest('.chart-section-header');
        if (header) {
            header.addEventListener('click', (e) => {
                if (e.target !== btn && !btn.contains(e.target)) {
                    btn.click();
                }
            });
        }
    });
    
    // 🆕 Сворачиваем все графики при первой загрузке
    setTimeout(() => {
        toggleButtons.forEach(btn => {
            const targetId = btn.getAttribute('data-target');
            const content = document.getElementById(`content-${targetId}`);
            if (content) {
                content.classList.add('collapsed');
                btn.classList.add('collapsed');
                const textEl = btn.querySelector('.toggle-text');
                if (textEl) {
                    textEl.textContent = 'Развернуть';
                }
            }
        });
    }, 100);
}

// 🆕 Мониторинг состояния сети
function updateConnectionStatus() {
    const statusEl = document.getElementById('connectionStatus');
    if (!statusEl) return;
    
    if (navigator.onLine) {
        statusEl.textContent = '🟢 Онлайн';
        statusEl.classList.remove('offline');
        statusEl.classList.add('online');
        statusEl.style.display = 'block';
    } else {
        statusEl.textContent = '🔴 Офлайн (работает кэш)';
        statusEl.classList.remove('online');
        statusEl.classList.add('offline');
        statusEl.style.display = 'block';
    }
}

// Слушаем события изменения соединения
window.addEventListener('online', updateConnectionStatus);
window.addEventListener('offline', updateConnectionStatus);

// Проверяем при загрузке страницы
window.addEventListener('load', updateConnectionStatus);

// 🆕 Вызов после загрузки данных
document.addEventListener('DOMContentLoaded', function() {
    loadData();
    initChartToggles();  // Инициализируем сворачивание
});


// События
dateSelect.addEventListener('change', (e) => updateCharts(e.target.value));
refreshBtn.addEventListener('click', () => loadData());
document.getElementById('exportBtn').addEventListener('click', () => {
    exportToCSV(dateSelect.value);
});

// Автозагрузка при открытии страницы
document.addEventListener('DOMContentLoaded', loadData);

// 🆕 Регистрация Service Worker для PWA
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(registration => {
                console.log('ServiceWorker registration successful:', registration.scope);
            })
            .catch(err => {
                console.log('ServiceWorker registration failed:', err);
            });
    });
}
